<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toffy & Fluffy: Match the Animal Babies</title>
    <!-- Google Fonts for playful text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Lilita+One&family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff5b7f;
            --secondary-color: #ffc75f;
            --success-color: #4dd894;
            --error-color: #ff5e62;
            --board-bg: #fffbf5;
            --card-border: #8b5a2b;
            --text-color: #4a2c11;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            background-color: #a3e635;
        }
        
        @media (max-width: 768px) {
            body, html {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }
        }

        /* Ambient Farm Background styling */
        .game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('images/farm_background.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            .game-wrapper {
                height: auto;
                min-height: 100vh;
                padding: 10px 0;
            }
        }

        /* Screen States */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            padding: 20px;
        }
        
        @media (max-width: 768px) {
            .screen {
                position: relative;
                height: auto;
                min-height: 100vh;
                justify-content: center;
                padding: 15px;
            }
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Floating Audio Control */
        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: white;
            border: 3px solid var(--card-border);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--card-border);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .sound-toggle:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--card-border);
        }

        .sound-toggle svg {
            width: 30px;
            height: 30px;
            fill: var(--text-color);
        }

        /* Floating Language Control */
        .lang-btn {
            position: absolute;
            top: 20px;
            right: 95px;
            z-index: 100;
            font-family: 'Lilita One', cursive;
            font-size: 18px;
            background: #ffc75f;
            color: var(--text-color);
            border: 3px solid var(--card-border);
            border-radius: 15px;
            padding: 10px 18px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--card-border);
            text-shadow: 1px 1px 0 white;
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .lang-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--card-border);
        }

        /* ================= SCREEN 1: START ================= */
        #screen-start {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            animation: bounceLogo 2s infinite ease-in-out;
            filter: drop-shadow(0 8px 0 rgba(0,0,0,0.15));
        }

        .logo-main {
            font-family: 'Lilita One', cursive;
            font-size: 85px;
            letter-spacing: 2px;
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .logo-toffy { color: #ff5b7f; text-shadow: 4px 4px 0 #fff, 8px 8px 0 #ffd3e0; }
        .logo-and { color: #ffd166; font-size: 60px; align-self: flex-end; text-shadow: 3px 3px 0 #fff, 6px 6px 0 #ffe9b3; }
        .logo-fluffy { color: #06d6a0; text-shadow: 4px 4px 0 #fff, 8px 8px 0 #c7f9eb; }

        .logo-subtitle {
            background-color: var(--secondary-color);
            color: var(--text-color);
            padding: 10px 25px;
            font-size: 24px;
            font-weight: 700;
            border-radius: 50px;
            border: 3px solid var(--card-border);
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 6px 0 var(--card-border);
        }

        /* Animated characters on start screen */
        .character-start-container {
            display: flex;
            gap: 80px;
            margin-bottom: 40px;
            align-items: flex-end;
        }

        .start-character {
            height: 250px;
            filter: drop-shadow(5px 5px 0 rgba(0,0,0,0.1));
            transition: transform 0.3s;
        }

        .start-character.toffy {
            animation: floatLeft 3s infinite ease-in-out;
        }

        .start-character.fluffy {
            animation: floatRight 3s infinite ease-in-out 0.5s;
        }

        /* Large Pulsing Play Button */
        .play-btn {
            font-family: 'Lilita One', cursive;
            font-size: 48px;
            color: white;
            background: linear-gradient(135deg, #ff9f43, #ff5252);
            border: 5px solid var(--card-border);
            border-radius: 80px;
            padding: 15px 70px;
            cursor: pointer;
            box-shadow: 0 12px 0 var(--card-border), 0 20px 25px rgba(0,0,0,0.2);
            text-shadow: 3px 3px 0 var(--card-border);
            transition: transform 0.15s, box-shadow 0.15s;
            animation: pulseBtn 1.5s infinite ease-in-out;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .play-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 var(--card-border), 0 10px 10px rgba(0,0,0,0.2);
            animation: none;
        }

        /* ================= SCREEN 2: GAMEPLAY ================= */
        #screen-game {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-end; /* Sits at the bottom */
            width: 100%;
            height: 100%;
            padding: 15px 30px;
            position: relative;
            gap: 20px;
        }

        /* Floating corner panels containing Mascot Cats */
        .mascot-side {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px; /* Larger */
            z-index: 100;
            pointer-events: none;
        }

        .mascot-side.left {
            left: auto;
            top: auto;
            transform: none;
        }

        .mascot-side.right {
            display: flex; /* Show right mascot */
            right: auto;
            top: auto;
            transform: none;
        }

        .mascot-side .mascot-bubble {
            pointer-events: auto;
        }

        .mascot-side img {
            width: 100%;
            height: auto;
            max-height: 420px; /* Larger */
            filter: drop-shadow(0 10px 16px rgba(0,0,0,0.18));
            pointer-events: auto;
            transition: transform 0.3s;
        }

        .mascot-side.left img {
            animation: hoverMascot 4s infinite ease-in-out;
        }

        .mascot-side.right img {
            animation: hoverMascot 4s infinite ease-in-out 0.5s;
        }

        /* Interactive mascot animations */
        @keyframes bounceMascot {
            0%, 100% { transform: scale(1) translateY(0); }
            30% { transform: scale(1.1, 0.9) translateY(0); }
            50% { transform: scale(0.9, 1.1) translateY(-30px); }
            70% { transform: scale(1.05, 0.95) translateY(0); }
            80% { transform: scale(0.98, 1.02) translateY(0); }
        }
        @keyframes shakeMascot {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20%, 60% { transform: translateX(-10px) rotate(-3deg); }
            40%, 80% { transform: translateX(10px) rotate(3deg); }
        }
        .bounce-mascot {
            animation: bounceMascot 0.8s ease-out !important;
        }
        .shake-mascot {
            animation: shakeMascot 0.5s ease-in-out !important;
        }

        .mascot-bubble {
            background: white;
            border: 3px solid var(--card-border);
            border-radius: 20px;
            padding: 12px 18px;
            font-size: 17px;
            font-weight: 700;
            color: var(--text-color);
            position: relative;
            margin-bottom: 12px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.08);
            max-width: 200px;
            text-align: center;
        }

        /* Responsive styling for mascots on smaller screens */
        @media (max-width: 1300px) {
            .mascot-side {
                width: 200px;
            }
            .mascot-side img {
                max-height: 280px;
            }
            .mascot-bubble {
                font-size: 14px;
                padding: 8px 12px;
                max-width: 155px;
            }
        }

        .mascot-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 12px 10px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }
        .mascot-bubble::before {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 13px 11px 0;
            border-style: solid;
            border-color: var(--card-border) transparent;
            display: block;
            width: 0;
            z-index: -1;
        }

        /* Central Game Board Container - WIDENED for more drawing space */
        .board-container {
            flex-grow: 1;
            max-width: 860px;
            height: 96%;
            background-color: var(--board-bg);
            background-image: radial-gradient(rgba(139, 90, 43, 0.04) 15%, transparent 15%);
            background-size: 24px 24px;
            border: 7px solid var(--card-border);
            border-radius: 40px;
            box-shadow: 0 16px 0 var(--card-border), 0 25px 40px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 15px 30px;
            z-index: 10;
        }

        /* Board Header Banner */
        .board-header {
            text-align: center;
            margin-bottom: 5px;
            position: relative;
            z-index: 10;
        }

        .pre-nursery-badge {
            background-color: #6c5ce7;
            color: white;
            font-size: 14px;
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 30px;
            display: inline-block;
            border: 3px solid var(--card-border);
            position: absolute;
            top: -24px;
            right: 5px;
            transform: rotate(5deg);
            box-shadow: 3px 4px 0 var(--card-border);
            font-family: 'Lilita One', cursive;
            letter-spacing: 1px;
        }

        .board-title {
            font-family: 'Lilita One', cursive;
            font-size: 38px;
            color: #ff4757;
            margin: 0;
            text-shadow: 3px 3px 0 #fff, 6px 6px 0 #ffccd5;
            letter-spacing: 1px;
        }

        .board-subtitle {
            background-color: var(--success-color);
            color: white;
            padding: 5px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            border: 2px solid var(--card-border);
            box-shadow: 0 3px 0 var(--card-border);
        }

        /* Columns Layout */
        .board-columns {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            flex: 1;
            position: relative;
            margin-top: 5px;
        }

        /* Vertical green dotted divider line */
        .board-divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            transform: translateX(-50%);
            width: 0;
            border-left: 5px dotted var(--success-color);
            z-index: 2;
            pointer-events: none;
        }

        /* Matching Column - Narrowed to leave a massive middle gap for drawing */
        .match-column {
            width: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Generous vertical spacing */
            z-index: 3;
        }

        /* Animal Card - Clean container with themed borders and backgrounds */
        .animal-card {
            background: white;
            border-radius: 26px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            width: 220px;
            height: 127px; /* Aspect ratio of 156/90 */
            box-shadow: 0 6px 0 rgba(139, 90, 43, 0.1), 0 8px 16px rgba(0,0,0,0.06);
            overflow: visible; /* Allows scaled images to pop out slightly */
        }

        .animal-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            mix-blend-mode: multiply; /* Multiplies colors to make white background transparent */
            transform: scale(1.22); /* Enlarge the animal by scaling past the image margins */
            transition: transform 0.2s;
        }

        /* Target left column specifically to make adult animals look even larger */
        .match-column.left .animal-img {
            transform: scale(1.48);
        }

        /* Card themes */
        .card-cow {
            border: 4px dashed #a78bfa !important; /* soft violet/purple */
            background: linear-gradient(135deg, #ffffff, #f3e8ff) !important;
        }
        .card-hen {
            border: 4px dashed #f59e0b !important; /* soft orange */
            background: linear-gradient(135deg, #ffffff, #fffbeb) !important;
        }
        .card-duck {
            border: 4px dashed #3b82f6 !important; /* soft blue */
            background: linear-gradient(135deg, #ffffff, #eff6ff) !important;
        }
        .card-sheep {
            border: 4px dashed #10b981 !important; /* soft green */
            background: linear-gradient(135deg, #ffffff, #ecfdf5) !important;
        }
        .card-horse {
            border: 4px dashed #ec4899 !important; /* soft pink/red */
            background: linear-gradient(135deg, #ffffff, #fdf2f8) !important;
        }

        /* Hovering effect on card when not matched */
        .animal-card:not(.matched):hover {
            transform: scale(1.06) rotate(1deg);
        }
        .animal-card:not(.matched):hover .animal-img {
            transform: scale(1.35); /* Wiggles up even larger on hover */
        }
        .match-column.left .animal-card:not(.matched):hover .animal-img {
            transform: scale(1.6);
        }

        .animal-card.matched {
            opacity: 0.95;
            pointer-events: none;
            box-shadow: none;
            transform: translateY(3px);
            border-style: solid !important;
            border-color: var(--success-color) !important;
        }

        .animal-card.matched .animal-img {
            transform: scale(1.18); /* Maintain good scale when matched */
        }
        .match-column.left .animal-card.matched .animal-img {
            transform: scale(1.42);
        }

        .animal-card.shake {
            animation: shakeCard 0.5s ease-in-out;
            border-color: var(--error-color) !important;
        }

        /* Alignment Connecting Dots - enlarged to 28px */
        .connect-dot {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: white;
            border: 5px solid var(--primary-color);
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.15);
            transition: transform 0.2s, background-color 0.2s, border-color 0.2s;
        }

        .connect-dot:hover {
            transform: translateY(-50%) scale(1.35);
            background-color: var(--primary-color);
        }

        /* Dot positions */
        .match-column.left .connect-dot {
            right: -14px;
        }
        .match-column.right .connect-dot {
            left: -14px;
            border-color: #4a6fa5;
        }

        .match-column.right .connect-dot:hover {
            background-color: #4a6fa5;
        }

        /* If card matched, hide/lock dots */
        .animal-card.matched .connect-dot {
            background-color: var(--success-color);
            border-color: var(--success-color);
            pointer-events: none;
            transform: translateY(-50%) scale(0.85);
            box-shadow: none;
        }

        /* SVG Overlay layer for drawing lines */
        #drawing-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* Drawing line styles - Thicker (8px) for easier viewing */
        .draw-line {
            stroke-linecap: round;
            stroke-width: 8;
            transition: stroke-dashoffset 1s linear;
        }

        .draw-line.temp {
            stroke: var(--primary-color);
            stroke-dasharray: 8 6;
            animation: dash 10s linear infinite;
        }

        .draw-line.correct {
            stroke: var(--success-color);
            filter: drop-shadow(0 2px 4px rgba(77, 216, 148, 0.4));
        }

        .draw-line.wrong {
            stroke: var(--error-color);
        }

        /* ================= SCREEN 3: SUCCESS OVERLAY ================= */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Confetti Canvas overlay */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 201;
            pointer-events: none;
        }

        .victory-card {
            background: white;
            border: 6px solid var(--card-border);
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 580px;
            text-align: center;
            z-index: 202;
            box-shadow: 0 20px 0 var(--card-border), 0 30px 45px rgba(0,0,0,0.4);
            transform: scale(0.7) translateY(-50px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .overlay.active .victory-card {
            transform: scale(1) translateY(0);
        }

        /* Star Badge on Victory */
        .victory-badge {
            background-color: var(--secondary-color);
            border: 4px solid var(--card-border);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -90px auto 20px;
            box-shadow: 0 8px 0 var(--card-border);
            animation: spinBadge 10s linear infinite;
        }

        .victory-badge svg {
            width: 80px;
            height: 80px;
            fill: #ff3f34;
        }

        .victory-title {
            font-family: 'Lilita One', cursive;
            font-size: 58px;
            color: #ff4757;
            margin: 0;
            text-shadow: 3px 3px 0 #fff, 6px 6px 0 #ffccd5;
            letter-spacing: 2px;
        }

        .victory-mascot-speech {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            background: #fff5f7;
            border: 3px solid #ffccd5;
            border-radius: 25px;
            padding: 15px 25px;
        }

        .victory-speech-bubble {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
        }

        .replay-btn {
            font-family: 'Lilita One', cursive;
            font-size: 38px;
            color: white;
            background: linear-gradient(135deg, #0be881, #05c46b);
            border: 4px solid var(--card-border);
            border-radius: 50px;
            padding: 12px 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--card-border);
            text-shadow: 2px 2px 0 var(--card-border);
            transition: transform 0.15s, box-shadow 0.15s;
            display: inline-block;
            margin-top: 10px;
        }

        .replay-btn:hover {
            transform: scale(1.05);
        }

        .replay-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--card-border);
        }

        /* Sparkle/Star animation particles in-game */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            animation: blowParticle 0.8s ease-out forwards;
        }

        /* ================= ANIMATION KEYFRAMES ================= */
        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }

        @keyframes bounceLogo {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes floatLeft {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-10px) rotate(-3deg); }
        }

        @keyframes floatRight {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        @keyframes hoverMascot {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-8px) rotate(-1deg); }
        }

        @keyframes spinBadge {
            100% { transform: rotate(360deg); }
        }

        @keyframes shakeCard {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        @keyframes blowParticle {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg);
                opacity: 0;
            }
        }

        .gameplay-next-btn {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: white;
            background: linear-gradient(135deg, #0be881, #05c46b);
            border: 4px solid var(--card-border);
            border-radius: 35px;
            padding: 10px 40px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--card-border);
            text-shadow: 2px 2px 0 var(--card-border);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .gameplay-next-btn:hover {
            transform: translateX(-50%) scale(1.05);
        }

        .gameplay-next-btn:active {
            transform: translateX(-50%) translateY(4px);
            box-shadow: 0 2px 0 var(--card-border);
        }

        /* ================= MOBILE RESPONSIVE ================= */

<body>

    <script>
        // Pre-warm Web Speech voices list on startup
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => {
                    window.speechSynthesis.getVoices();
                };
            }
        }

        // Game State Variables
        let isDragging = false;
        let activeLine = null;
        let startDot = null;
        let startCoords = null;
        let matchesCount = 0;
        const totalMatches = 5;

        // Sound configuration
        let audioCtx = null;
        let bgMusicInterval = null;
        let soundEnabled = true;
        let melodyIndex = 0;

        // List of babies to shuffle and render on startup
        const babyTemplates = [
            {
                id: 'calf',
                match: 'cow',
                name: 'Calf',
                img: 'calf_character.png',
                class: 'card-cow'
            },
            {
                id: 'chick',
                match: 'hen',
                name: 'Chick',
                img: 'chick_character.png',
                class: 'card-hen'
            },
            {
                id: 'duckling',
                match: 'duck',
                name: 'Duckling',
                img: 'duckling_character.png',
                class: 'card-duck'
            },
            {
                id: 'lamb',
                match: 'sheep',
                name: 'Lamb',
                img: 'lamb_character.png',
                class: 'card-sheep'
            },
            {
                id: 'foal',
                match: 'horse',
                name: 'Foal',
                img: 'foal_character.png',
                class: 'card-horse'
            }
        ];

        // Nursery rhyme melody loop
        const melody = [
            {note: 329.63, duration: 0.4}, {note: 293.66, duration: 0.4}, {note: 261.63, duration: 0.4}, {note: 293.66, duration: 0.4},
            {note: 329.63, duration: 0.4}, {note: 329.63, duration: 0.4}, {note: 329.63, duration: 0.8},
            {note: 293.66, duration: 0.4}, {note: 293.66, duration: 0.4}, {note: 293.66, duration: 0.8},
            {note: 329.63, duration: 0.4}, {note: 392.00, duration: 0.4}, {note: 392.00, duration: 0.8},
            {note: 329.63, duration: 0.4}, {note: 293.66, duration: 0.4}, {note: 261.63, duration: 0.4}, {note: 293.66, duration: 0.4},
            {note: 329.63, duration: 0.4}, {note: 329.63, duration: 0.4}, {note: 329.63, duration: 0.4}, {note: 329.63, duration: 0.4},
            {note: 293.66, duration: 0.4}, {note: 293.66, duration: 0.4}, {note: 329.63, duration: 0.4}, {note: 293.66, duration: 0.4},
            {note: 261.63, duration: 0.8}
        ];

        // Initialize Web Audio API context
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Synthesize single note
        function playNote(freq, type, duration, startTime) {
            if (!soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, startTime);
            
            gain.gain.setValueAtTime(0.12, startTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        // Play chime sound (Correct Match)
        function playSuccessSound() {
            if (!soundEnabled) return;
            const now = audioCtx.currentTime;
            playNote(392.00, 'triangle', 0.1, now);     // G4
            playNote(523.25, 'triangle', 0.1, now + 0.08); // C5
            playNote(659.25, 'triangle', 0.1, now + 0.16); // E5
            playNote(783.99, 'triangle', 0.3, now + 0.24); // G5
        }

        // Play buzz sound (Wrong Match)
        function playWrongSound() {
            if (!soundEnabled) return;
            const now = audioCtx.currentTime;
            playNote(150, 'sawtooth', 0.15, now);
            playNote(100, 'sawtooth', 0.25, now + 0.08);
        }

        // Play Fanfare sound (Victory)
        function playVictorySound() {
            if (!soundEnabled) return;
            const now = audioCtx.currentTime;
            playNote(261.63, 'sine', 0.2, now); // C4
            playNote(329.63, 'sine', 0.2, now); // E4
            playNote(392.00, 'sine', 0.2, now); // G4
            
            playNote(349.23, 'sine', 0.2, now + 0.25); // F4
            playNote(440.00, 'sine', 0.2, now + 0.25); // A4
            playNote(523.25, 'sine', 0.2, now + 0.25); // C5
            
            playNote(392.00, 'sine', 0.2, now + 0.5); // G4
            playNote(493.88, 'sine', 0.2, now + 0.5); // B4
            playNote(587.33, 'sine', 0.2, now + 0.5); // D5
            
            playNote(523.25, 'sine', 0.8, now + 0.75); // C5
            playNote(659.25, 'sine', 0.8, now + 0.75); // E5
            playNote(783.99, 'sine', 0.8, now + 0.75); // G5
        }

        // Music synthesis loop
        function startBgMusic() {
            if (!soundEnabled) return;
            initAudio();
            stopBgMusic();
            
            bgMusicInterval = setInterval(() => {
                if (!soundEnabled) return;
                const noteObj = melody[melodyIndex];
                const now = audioCtx.currentTime;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(noteObj.note, now);
                
                gain.gain.setValueAtTime(0.035, now);
                gain.gain.linearRampToValueAtTime(0.0001, now + noteObj.duration * 0.95);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + noteObj.duration);
                
                melodyIndex = (melodyIndex + 1) % melody.length;
            }, 400);
        }

        function stopBgMusic() {
            if (bgMusicInterval) {
                clearInterval(bgMusicInterval);
                bgMusicInterval = null;
            }
        }

        // Web Speech API Voice synthesis
        function speakVoice(text, rate = 1.0, pitch = 1.0) {
            if (!soundEnabled) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = rate;
                utterance.pitch = pitch;
                utterance.lang = language === 'EN' ? 'en-US' : 'hi-IN';

                // Locate a suitable voice (handles 'hi' / 'hi-in' / 'hindi' in case-insensitive and safe way)
                const voices = window.speechSynthesis.getVoices();
                const cleanVoice = voices.find(voice => 
                    voice && voice.lang && (
                        voice.lang.toLowerCase().startsWith(language.toLowerCase()) ||
                        (language === 'HI' && (
                            voice.lang.toLowerCase().includes('hi') ||
                            voice.name.toLowerCase().includes('hindi')
                        ))
                    )
                );
                if (cleanVoice) utterance.voice = cleanVoice;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // Language Translation Dictionary
        const translations = {
            EN: {
                startSubtitle: "PRE-NURSERY MATCHING GAME",
                play: "PLAY",
                boardTitle: "MATCH THE ANIMAL BABIES",
                boardSubtitle: "Draw a line to match each animal to its baby.",
                toffyBubbleStart: "Can You Match The Babies? 🐱",
                nextGame: "NEXT GAME ➔",
                victoryTitle: "YOU DID IT!",
                victorySpeech: "Amazing! You Found All Babies! 🏆",
                playAgain: "PLAY AGAIN",
                tryAgain: "Try Again! 🐣",
                greatJob: "Great Job! 🎉",
                and: " and ",
                animals: {
                    cow: "Cow",
                    calf: "Calf",
                    hen: "Hen",
                    chick: "Chick",
                    duck: "Duck",
                    duckling: "Duckling",
                    sheep: "Sheep",
                    lamb: "Lamb",
                    horse: "Horse",
                    foal: "Foal"
                }
            },
            HI: {
                startSubtitle: "प्री-नर्सरी मिलान खेल",
                play: "खेलो",
                boardTitle: "जानवरों के बच्चों का मिलान करें",
                boardSubtitle: "प्रत्येक जानवर को उसके बच्चे से मिलाने के लिए एक रेखा खींचें।",
                toffyBubbleStart: "क्या आप बच्चों का मिलान कर सकते हैं? 🐱",
                nextGame: "अगला खेल ➔",
                victoryTitle: "आपने कर दिखाया!",
                victorySpeech: "अद्भुत! आपने सभी बच्चों को ढूंढ लिया! 🏆",
                playAgain: "फिर से खेलें",
                tryAgain: "फिर से प्रयास करो! 🐣",
                greatJob: "बहुत बढ़िया! 🎉",
                and: " और ",
                animals: {
                    cow: "गाय",
                    calf: "बछड़ा",
                    hen: "मुर्गी",
                    chick: "चूजा",
                    duck: "बतख",
                    duckling: "बतख का बच्चा",
                    sheep: "भेड़",
                    lamb: "मेमना",
                    horse: "घोड़ा",
                    foal: "बछेड़ा"
                }
            }
        };

        let language = 'EN'; // Default EN

        function toggleLanguage() {
            language = language === 'EN' ? 'HI' : 'EN';
            document.getElementById('lang-btn').innerText = language;
            updateLanguageUI();
            
            // Speak start bubble
            const bubbleText = language === 'EN' ? translations.EN.toffyBubbleStart : translations.HI.toffyBubbleStart;
            speakVoice(bubbleText);
        }

        function updateLanguageUI() {
            const t = translations[language];
            
            // Start Screen
            document.querySelector('.logo-subtitle').innerText = t.startSubtitle;
            document.querySelector('.play-btn').innerText = t.play;
            
            // Game Screen Header
            document.querySelector('.board-title').innerText = t.boardTitle;
            document.querySelector('.board-subtitle').innerText = t.boardSubtitle;
            
            // Toffy Bubble
            document.getElementById('toffy-bubble').innerText = t.toffyBubbleStart;
            
            // Navigation Buttons
            document.querySelectorAll('.gameplay-next-btn').forEach(btn => btn.innerText = t.nextGame);
            document.querySelectorAll('.next-btn').forEach(btn => btn.innerText = t.nextGame);
            document.querySelector('.replay-btn').innerText = t.playAgain;
            
            // Victory screen
            document.querySelector('.victory-title').innerText = t.victoryTitle;
            document.querySelector('.victory-speech-bubble').innerText = t.victorySpeech;
        }

        // Shuffle Array helper
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Populate baby animals in a shuffled layout
        function setupGameLayout() {
            const rightColumn = document.getElementById('right-column');
            rightColumn.innerHTML = '';
            
            const shuffledBabies = shuffle([...babyTemplates]);
            
            shuffledBabies.forEach(baby => {
                const card = document.createElement('div');
                card.className = `animal-card ${baby.class}`;
                card.setAttribute('data-id', baby.id);
                card.setAttribute('data-match', baby.match);
                
                card.innerHTML = `
                    <img src="${baby.img}" class="animal-img" alt="${baby.name}">
                    <div class="connect-dot" data-dot="${baby.id}"></div>
                `;
                rightColumn.appendChild(card);
            });

            bindDragEvents();
        }

        // Toggle sound setting
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.querySelector('.sound-toggle');
            const icon = document.getElementById('sound-icon');
            
            if (soundEnabled) {
                icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
                startBgMusic();
            } else {
                icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
                stopBgMusic();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
            }
        }

        // Start Game from Home Screen
        function startGame() {
            document.getElementById('screen-start').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            initAudio();
            if (soundEnabled) {
                startBgMusic();
            }
            setupGameLayout();
            const startSpeech = language === 'EN' ? "Let's match the animal babies!" : "जानवरों के बच्चों का मिलान करो!";
            speakVoice(startSpeech, 1.0, 1.1);
        }

        // Setup Drag Coordinates mapping
        function getRelativeCoords(e, container) {
            const rect = container.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function bindDragEvents() {
            const leftDots = document.querySelectorAll('.match-column.left .connect-dot');
            const board = document.querySelector('.board-columns');
            const svg = document.getElementById('drawing-svg');

            leftDots.forEach(dot => {
                const startDrag = (e) => {
                    const card = dot.closest('.animal-card');
                    if (card.classList.contains('matched')) return;

                    isDragging = true;
                    startDot = dot;
                    
                    card.style.transform = 'scale(1.05) rotate(1deg)';
                    
                    const rect = svg.getBoundingClientRect();
                    const dotRect = dot.getBoundingClientRect();
                    startCoords = {
                        x: (dotRect.left + dotRect.width / 2) - rect.left,
                        y: (dotRect.top + dotRect.height / 2) - rect.top
                    };

                    activeLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    activeLine.setAttribute('x1', startCoords.x);
                    activeLine.setAttribute('y1', startCoords.y);
                    activeLine.setAttribute('x2', startCoords.x);
                    activeLine.setAttribute('y2', startCoords.y);
                    activeLine.setAttribute('class', 'draw-line temp');
                    svg.appendChild(activeLine);

                    e.preventDefault();
                };

                dot.addEventListener('mousedown', startDrag);
                dot.addEventListener('touchstart', startDrag, { passive: false });
            });

            const moveDrag = (e) => {
                if (!isDragging || !activeLine) return;
                
                const coords = getRelativeCoords(e, svg);
                activeLine.setAttribute('x2', coords.x);
                activeLine.setAttribute('y2', coords.y);

                const targetDot = getHoveredDot(e);
                if (targetDot) {
                    targetDot.style.transform = 'translateY(-50%) scale(1.45)';
                } else {
                    document.querySelectorAll('.match-column.right .connect-dot').forEach(d => {
                        d.style.transform = '';
                    });
                }
            };

            window.addEventListener('mousemove', moveDrag);
            window.addEventListener('touchmove', moveDrag, { passive: false });

            const endDrag = (e) => {
                if (!isDragging) return;
                isDragging = false;
                
                const sourceCard = startDot.closest('.animal-card');
                sourceCard.style.transform = '';

                const destDot = getHoveredDot(e);
                const t = translations[language];
                
                if (destDot) {
                    destDot.style.transform = '';
                    const destCard = destDot.closest('.animal-card');
                    
                    const sourceId = sourceCard.getAttribute('data-id');
                    const destMatchId = destCard.getAttribute('data-match');
                    const destId = destCard.getAttribute('data-id');

                    if (sourceId === destMatchId && !destCard.classList.contains('matched')) {
                        // CORRECT MATCH
                        lockConnectionLine(startDot, destDot);
                        
                        sourceCard.classList.add('matched');
                        destCard.classList.add('matched');
                        
                        playSuccessSound();
                        const name1 = t.animals[sourceId];
                        const name2 = t.animals[destId];
                        const speakText = name1 + t.and + name2 + "!";
                        speakVoice(speakText, 0.95, 1.25);
                        
                        spawnParticles(destDot);

                        matchesCount++;
                        if (matchesCount === totalMatches) {
                            showMascotSpeech(t.victorySpeech, 'correct');
                            setTimeout(triggerVictory, 1200);
                        } else {
                            showMascotSpeech(t.greatJob, 'correct');
                        }
                    } else {
                        // WRONG MATCH
                        shakeAndReset(sourceCard, destCard);
                        playWrongSound();
                        speakVoice(t.tryAgain, 1.0, 1.0);
                        showMascotSpeech(t.tryAgain, 'wrong');
                        activeLine.remove();
                    }
                } else {
                    activeLine.remove();
                }

                activeLine = null;
                startDot = null;
            };

            window.addEventListener('mouseup', endDrag);
            window.addEventListener('touchend', endDrag);
        }

        // Helper to check if cursor is near a destination dot on release
        function getHoveredDot(e) {
            const dots = document.querySelectorAll('.match-column.right .connect-dot');
            let clientX, clientY;
            if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            for (let dot of dots) {
                const rect = dot.getBoundingClientRect();
                const dist = Math.hypot(
                    clientX - (rect.left + rect.width / 2),
                    clientY - (rect.top + rect.height / 2)
                );
                if (dist < 45) return dot;
            }
            return null;
        }

        // Lock line drawing green between correct matches
        function lockConnectionLine(dot1, dot2) {
            const svg = document.getElementById('drawing-svg');
            const rect = svg.getBoundingClientRect();
            
            const r1 = dot1.getBoundingClientRect();
            const r2 = dot2.getBoundingClientRect();

            const x1 = (r1.left + r1.width / 2) - rect.left;
            const y1 = (r1.top + r1.height / 2) - rect.top;
            const x2 = (r2.left + r2.width / 2) - rect.left;
            const y2 = (r2.top + r2.height / 2) - rect.top;

            activeLine.setAttribute('x2', x2);
            activeLine.setAttribute('y2', y2);
            activeLine.setAttribute('class', 'draw-line correct');
        }

        // Shake animation for mismatch feedback
        function shakeAndReset(card1, card2) {
            card1.classList.add('shake');
            if (card2) card2.classList.add('shake');

            setTimeout(() => {
                card1.classList.remove('shake');
                if (card2) card2.classList.remove('shake');
            }, 500);
        }

        // Helper to capitalize string
        function capitalize(s) {
            return s.charAt(0).toUpperCase() + s.slice(1);
        }

        // Dynamically update bubble dialogues on match feedback
        function showMascotSpeech(text, type) {
            const toffyBubble = document.getElementById('toffy-bubble');
            const fluffyBubble = document.getElementById('fluffy-bubble');
            const toffyImg = document.querySelector('.mascot-side.left img');
            const fluffyImg = document.querySelector('.mascot-side.right img');
            
            if (toffyBubble) toffyBubble.innerHTML = text;
            if (fluffyBubble) fluffyBubble.innerHTML = text;
            
            // Trigger animation on mascot images
            if (toffyImg) {
                toffyImg.classList.remove('bounce-mascot', 'shake-mascot');
                void toffyImg.offsetWidth; // Force reflow
                if (type === 'correct') toffyImg.classList.add('bounce-mascot');
                else if (type === 'wrong') toffyImg.classList.add('shake-mascot');
            }
            if (fluffyImg) {
                fluffyImg.classList.remove('bounce-mascot', 'shake-mascot');
                void fluffyImg.offsetWidth; // Force reflow
                if (type === 'correct') fluffyImg.classList.add('bounce-mascot');
                else if (type === 'wrong') fluffyImg.classList.add('shake-mascot');
            }
        }

        // Spawn interactive visual star particles around match
        function spawnParticles(targetDot) {
            const rect = targetDot.getBoundingClientRect();
            const px = rect.left + rect.width / 2;
            const py = rect.top + rect.height / 2;

            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = `${px}px`;
                p.style.top = `${py}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 80;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);

                p.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="${getRandomStarColor()}">
                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                    </svg>
                `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function getRandomStarColor() {
            const colors = ['#ffd166', '#4dd894', '#ff6f91', '#4a90e2', '#a3e635'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // ================= CONFETTI & GAME COMPLETION =================

        let confettiActive = false;
        const confettiPieces = [];

        function triggerVictory() {
            stopBgMusic();
            playVictorySound();
            
            document.getElementById('victory-overlay').classList.add('active');
            const victorySpeech = language === 'EN' ? "Excellent Job! You Did It!" : "शानदार काम! आपने कर दिखाया!";
            speakVoice(victorySpeech, 1.0, 1.2);
            
            confettiActive = true;
            setupConfetti();
        }

        function setupConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            confettiPieces.length = 0;
            for (let i = 0; i < 120; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: 8 + Math.random() * 10,
                    color: getRandomStarColor(),
                    speed: 2 + Math.random() * 5,
                    angle: Math.random() * 360,
                    spin: -3 + Math.random() * 6
                });
            }

            function drawFrame() {
                if (!confettiActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                confettiPieces.forEach(p => {
                    p.y += p.speed;
                    p.angle += p.spin;
                    if (p.y > canvas.height) {
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                });

                requestAnimationFrame(drawFrame);
            }

            requestAnimationFrame(drawFrame);
        }

        // Full Game Reset
        function resetGame() {
            confettiActive = false;
            document.getElementById('victory-overlay').classList.remove('active');
            
            const svg = document.getElementById('drawing-svg');
            svg.innerHTML = '';

            document.querySelectorAll('.animal-card').forEach(card => {
                card.classList.remove('matched');
                card.style.transform = '';
            });

            matchesCount = 0;
            setupGameLayout();

            if (soundEnabled) {
                startBgMusic();
            }

            document.getElementById('toffy-bubble').innerHTML = translations[language].toffyBubbleStart;
        }
    </script>
</body>
